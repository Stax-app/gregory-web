<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StaxLabs — Content Engine</title>
  <meta name="description" content="StaxLabs Content Engine — Generate market intelligence content for social platforms." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="staxlabs.css?v=20260311" />
</head>
<body>
  <div class="sl-app">
    <!-- Header -->
    <header class="sl-header">
      <div class="sl-header-inner">
        <div class="sl-logo">
          <span class="sl-logo-stax">STAX</span><span class="sl-logo-labs">LABS</span>
        </div>
        <span class="sl-subtitle">Content Engine</span>
      </div>
    </header>

    <!-- Template Grid View -->
    <section class="sl-templates" id="templateGrid">
      <div class="sl-section-header">
        <h2>Create Content</h2>
        <p class="sl-section-desc">Select a template to generate market intelligence content.</p>
      </div>
      <div class="sl-grid" id="templateCards"></div>
    </section>

    <!-- Generation Panel (hidden by default) -->
    <section class="sl-generate" id="generatePanel" style="display:none;">
      <button class="sl-back-btn" id="backBtn" onclick="StaxApp.goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back
      </button>

      <div class="sl-gen-header" id="genHeader"></div>

      <div class="sl-gen-params" id="genParams"></div>

      <button class="sl-btn sl-btn-primary" id="generateBtn" onclick="StaxApp.handleGenerate()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Generate
      </button>

      <!-- Loading -->
      <div class="sl-loading" id="loadingState" style="display:none;">
        <div class="sl-spinner"></div>
        <p>Generating content...</p>
      </div>

      <!-- Preview Area -->
      <div class="sl-preview" id="previewArea" style="display:none;">
        <h3 class="sl-preview-title">Preview</h3>
        <div class="sl-preview-content" id="previewContent"></div>

        <!-- Action Buttons -->
        <div class="sl-actions" id="actionButtons" style="display:none;">
          <div class="sl-action-tabs">
            <button class="sl-action-tab active" data-action="script" id="tabScript">Copy Script</button>
            <button class="sl-action-tab" data-action="download" id="tabDownload">Download Card</button>
            <button class="sl-action-tab" data-action="caption" id="tabCaption">Copy Caption</button>
          </div>
          <div class="sl-action-content" id="actionContent"></div>
        </div>

        <!-- Caption Tabs -->
        <div class="sl-captions" id="captionTabs" style="display:none;">
          <h4>Platform Captions</h4>
          <div class="sl-caption-tabs" id="captionTabBar"></div>
          <div class="sl-caption-body" id="captionBody"></div>
        </div>
      </div>
    </section>

    <!-- History Section -->
    <section class="sl-history" id="historySection">
      <div class="sl-section-header">
        <h2>Recent</h2>
      </div>
      <div class="sl-history-list" id="historyList">
        <p class="sl-empty">No content generated yet.</p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="staxlabs-cards.js?v=20260311"></script>
  <script src="staxlabs-app.js?v=20260311"></script>
</body>
</html>
