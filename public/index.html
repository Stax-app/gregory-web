<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREGORY — Marketing Intelligence</title>
  <meta name="description" content="Ask GREGORY anything about marketing strategy, behavioral psychology, financial data, and more. Powered by peer-reviewed research and real-time data." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#/" class="logo" id="logoLink">
          <div class="logo-icon">G</div>
          <div class="logo-text">
            <h1>GREGORY</h1>
            <span class="logo-subtitle">Marketing Intelligence</span>
          </div>
        </a>
        <button class="sidebar-toggle" id="sidebarClose" aria-label="Close sidebar">&times;</button>
      </div>

      <div class="agent-nav">
        <h3 class="section-label">Agents</h3>
        <div id="agentNavList"></div>
      </div>

      <div class="sidebar-footer">
        <!-- Auth UI -->
        <div id="authContainer">
          <div id="authForm" class="auth-form">
            <input type="email" id="authEmail" class="auth-input" placeholder="Email address" />
            <input type="password" id="authPassword" class="auth-input" placeholder="Password" />
            <div class="auth-actions">
              <button class="auth-btn auth-btn-primary" id="authSignIn">Sign In</button>
              <button class="auth-btn" id="authSignUp">Sign Up</button>
            </div>
            <button class="auth-btn auth-btn-magic" id="authMagicLink">Send Magic Link</button>
            <p class="auth-message" id="authMessage"></p>
          </div>
          <div id="userBar" class="user-bar" style="display:none;">
            <div class="user-bar-info">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span id="userEmail" class="user-bar-email"></span>
            </div>
            <button class="auth-btn auth-btn-small" id="authSignOut">Sign Out</button>
          </div>
        </div>
        <div class="data-status" id="dataStatus">
          <div class="status-dot"></div>
          <span id="statusText">Knowledge graph active</span>
        </div>
        <p class="disclaimer" id="disclaimer">Responses use peer-reviewed research and verified data. All numbers labeled as REPORTED, ESTIMATE, or UNKNOWN.</p>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main">
      <header class="main-header">
        <button class="sidebar-toggle-mobile" id="sidebarOpen" aria-label="Open sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-info">
          <span class="header-badge" id="headerBadge">Citation-First AI</span>
          <button class="clear-btn" id="clearChat" title="New conversation">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New Chat
          </button>
          <button class="clear-btn" id="historyToggle" title="Chat history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            History
          </button>
          <div class="history-panel" id="historyPanel">
            <div class="history-panel-tabs">
              <button class="history-tab active" data-tab="conversations">Conversations</button>
              <button class="history-tab" data-tab="tasks">Tasks</button>
            </div>
            <div class="history-panel-list" id="historyList"></div>
            <div class="history-panel-list" id="taskHistoryList" style="display:none;"></div>
          </div>
        </div>
      </header>

      <div class="chat-container" id="chatContainer">
        <!-- Welcome Screen (content rendered by JS) -->
        <div class="welcome" id="welcomeScreen"></div>

        <!-- Messages will be appended here -->
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper" id="inputWrapper">
          <div class="agent-tag-dropdown" id="agentTagDropdown"></div>
          <textarea
            id="messageInput"
            placeholder="Ask GREGORY anything about marketing…"
            rows="1"
            maxlength="4000"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
          </button>
        </div>
        <span class="input-hint" id="inputHint">GREGORY uses peer-reviewed research & real-time data. All claims are sourced.</span>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="agents.js"></script>
  <script src="app.js"></script>
  <script src="agentic-ui.js"></script>
  <script src="document-upload.js"></script>
</body>
</html>
