name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'supabase/functions/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: civpkkhofvpaifprhpii

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy gregory-chat
        run: supabase functions deploy gregory-chat --project-ref $PROJECT_REF

      - name: Deploy gregory-daily-sync
        run: supabase functions deploy gregory-daily-sync --project-ref $PROJECT_REF
